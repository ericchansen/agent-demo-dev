<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Copilot CLI report flow</title>
  <desc id="desc">Terminal-style visual showing a Copilot CLI prompt generating quota report artifacts.</desc>
  <rect width="960" height="540" fill="#101827"/>
  <rect x="46" y="42" width="868" height="456" rx="18" fill="#0b1220" stroke="#334155"/>
  <circle cx="78" cy="70" r="8" fill="#ef4444"/>
  <circle cx="104" cy="70" r="8" fill="#f59e0b"/>
  <circle cx="130" cy="70" r="8" fill="#22c55e"/>
  <text x="70" y="122" fill="#94a3b8" font-family="Consolas, monospace" font-size="18">$ copilot</text>
  <text x="70" y="164" fill="#e2e8f0" font-family="Consolas, monospace" font-size="18">&gt; Generate a quota estimation report for Tailspin Toys</text>
  <text x="70" y="206" fill="#38bdf8" font-family="Consolas, monospace" font-size="17">tool: fabric_query or databricks_query</text>
  <text x="70" y="238" fill="#38bdf8" font-family="Consolas, monospace" font-size="17">tool: generate_quota_estimation_report</text>
  <text x="70" y="292" fill="#86efac" font-family="Consolas, monospace" font-size="17">Summary: base quota estimate generated</text>
  <text x="70" y="330" fill="#fde68a" font-family="Consolas, monospace" font-size="17">output/quota-estimates/tailspin_toys_base_quota_estimate.xlsx</text>
  <text x="70" y="362" fill="#fde68a" font-family="Consolas, monospace" font-size="17">output/quota-estimates/tailspin_toys_base_quota_estimate.html</text>
  <text x="70" y="394" fill="#fde68a" font-family="Consolas, monospace" font-size="17">output/quota-estimates/tailspin_toys_base_quota_estimate.pdf</text>
  <rect x="70" y="430" width="220" height="34" rx="17" fill="#2563eb"/>
  <text x="99" y="452" fill="#ffffff" font-family="Segoe UI, Arial" font-size="15" font-weight="700">Day 1 checkpoint passes</text>
</svg>
