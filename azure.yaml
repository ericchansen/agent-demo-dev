# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.0-preview'
name: agent-demo-dev
metadata:
    template: agent-demo-dev@0.1.0
# No deployable app service lives in this repo. The hosted agent runtime was
# removed during simplification; the market-research agent is deployed from its
# own repo (github.com/ericchansen/market-research). azd is used here for
# infrastructure provisioning only (azd provision / az deployment group create).
infra:
    provider: bicep
    path: infra
    module: main
