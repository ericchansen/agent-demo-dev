# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.0-preview'
name: agent-demo-dev
metadata:
    template: agent-demo-dev@0.1.0
services:
    wwi-sales-hosted:
        project: ./src/orchestrator/hosted_agent
        host: azure.ai.agent
        language: docker
        docker:
            path: ./Dockerfile
            context: ../../..
            registry: ${AZURE_CONTAINER_REGISTRY_ENDPOINT}
            remoteBuild: false
        config:
            container:
                resources:
                    cpu: "1"
                    memory: 2Gi
            deployments:
                - model:
                    format: OpenAI
                    name: gpt-4o
                    version: "2024-11-20"
                  name: gpt-4o
                  sku:
                    capacity: 10
                    name: GlobalStandard
            startupCommand: python -m src.orchestrator.hosted_agent.server
infra:
    provider: bicep
    path: infra
    module: main
