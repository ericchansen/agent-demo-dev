name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths: ['infra/**']
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-infra-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v5

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: What-if Bicep
        continue-on-error: true
        run: |
          az deployment group what-if \
            --resource-group rg-fabric-agent-dev \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.bicepparam \
            --result-format FullResourcePayloads

      # A paused Fabric capacity rejects updates with "Service is not ready to be
      # updated", which fails the Bicep deploy. Resume it first, then always suspend
      # again in the final step so the run nets back to the cost-safe paused state.
      - name: Resume Fabric capacity
        run: |
          capacity_id="/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/rg-fabric-agent-dev/providers/Microsoft.Fabric/capacities/fabricagentdemodev"
          for attempt in $(seq 1 30); do
            state="$(az resource show --ids "$capacity_id" --api-version 2023-11-01 --query properties.state -o tsv || true)"
            if [ "$state" = "Active" ]; then
              echo "Fabric capacity is already Active."
              exit 0
            fi
            if az resource invoke-action \
              --ids "$capacity_id" \
              --action resume \
              --api-version 2023-11-01; then
              exit 0
            fi
            echo "Fabric capacity resume attempt ${attempt} failed while state='${state}'; waiting before retry."
            sleep 30
          done
          echo "::error title=Fabric capacity::Unable to resume capacity after retries."
          exit 1

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group rg-fabric-agent-dev \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.bicepparam

      - name: Suspend Fabric capacity
        if: always()
        run: |
          capacity_id="/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/rg-fabric-agent-dev/providers/Microsoft.Fabric/capacities/fabricagentdemodev"
          for attempt in 1 2 3 4 5; do
            state="$(az resource show --ids "$capacity_id" --api-version 2023-11-01 --query properties.state -o tsv || true)"
            if [ "$state" = "Paused" ]; then
              echo "Fabric capacity is already Paused."
              exit 0
            fi
            if az resource invoke-action \
              --ids "$capacity_id" \
              --action suspend \
              --api-version 2023-11-01; then
              exit 0
            fi
            echo "Fabric capacity suspend attempt ${attempt} failed while state='${state}'; waiting before retry."
            sleep 30
          done
          echo "::warning title=Fabric capacity::Unable to suspend capacity after retries; check cost guardrails manually."
