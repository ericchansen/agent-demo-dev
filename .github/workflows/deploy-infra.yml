name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths: ['infra/**']
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # A paused Fabric capacity rejects updates with "Service is not ready to be
      # updated", which fails the Bicep deploy. Resume it first, then always suspend
      # again in the final step so the run nets back to the cost-safe paused state.
      - name: Resume Fabric capacity
        uses: azure/cli@v2
        with:
          inlineScript: |
            az fabric capacity resume \
              --resource-group rg-fabric-agent-dev \
              --capacity-name fabricagentdemodev

      - name: Deploy Bicep
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment group create \
              --resource-group rg-fabric-agent-dev \
              --template-file infra/main.bicep \
              --parameters infra/parameters/dev.bicepparam

      - name: Suspend Fabric capacity
        if: always()
        uses: azure/cli@v2
        with:
          inlineScript: |
            az fabric capacity suspend \
              --resource-group rg-fabric-agent-dev \
              --capacity-name fabricagentdemodev
