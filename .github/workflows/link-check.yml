name: Link Check

# Validates external and internal links across the workshop docs. Runs on a weekly
# schedule and on demand. It is intentionally separate from the required CI gate,
# but scheduled/manual runs fail when public links or fragments break.

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: lychee-

      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --cache
            --max-cache-age 1d
            --max-retries 3
            --retry-wait-time 10
            --timeout 20
            --accept 200,206,403,429
            --include-fragments
            --no-progress
            "docs/**/*.md"
            "website/docs/**/*.md"
            "website/docs/**/*.mdx"
            "README.md"
            "CONTRIBUTING.md"
          fail: true
          jobSummary: true
