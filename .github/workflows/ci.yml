name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy src/

      - name: Unit tests
        run: pytest tests/unit/

      - name: Golden QA eval
        run: python tests/eval/run_eval.py --mock --pass-rate 100

      - name: Demo readiness
        run: python scripts/demo_check.py

      - name: Recorded backend E2E proof
        run: python scripts/recorded_live_proof.py

      - name: Workshop visual proof
        run: python scripts/check_workshop_visuals.py

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build

  validate-bicep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate Bicep
        run: az bicep build --file infra/main.bicep
