name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy src/

      - name: Unit tests
        run: pytest tests/unit/

      - name: Golden QA eval
        run: python tests/eval/run_eval.py --mock --pass-rate 100

      - name: Demo readiness
        run: python scripts/demo_check.py

      - name: Workshop visual proof
        run: python scripts/check_workshop_visuals.py

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build

  validate-bicep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Azure CLI
        uses: azure/cli@v2
        with:
          inlineScript: az bicep build --file infra/main.bicep

  hosted-agent-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build hosted agent image
        run: docker build -f src/orchestrator/hosted_agent/Dockerfile -t wwi-hosted-agent:ci .

      - name: Probe hosted agent health endpoints
        run: |
          set -euo pipefail
          container_id="$(docker run -d -p 8080:8080 wwi-hosted-agent:ci)"
          trap 'docker rm -f "$container_id" >/dev/null 2>&1 || true' EXIT

          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:8080/healthz >/tmp/healthz.json; then
              break
            fi
            sleep 1
          done

          curl --fail --silent --show-error http://127.0.0.1:8080/healthz | tee /tmp/healthz.json
          curl --fail --silent --show-error http://127.0.0.1:8080/readyz | tee /tmp/readyz.json
