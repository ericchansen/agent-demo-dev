name: Live Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "30 10 * * 1"

permissions:
  contents: read
  id-token: write

jobs:
  foundry-registration:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.config.outputs.configured }}
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      FOUNDRY_PROJECT_ENDPOINT: ${{ secrets.FOUNDRY_PROJECT_ENDPOINT }}
      MODEL_DEPLOYMENT_NAME: ${{ secrets.MODEL_DEPLOYMENT_NAME }}
    steps:
      - uses: actions/checkout@v4
      - name: Check Foundry configuration
        id: config
        run: |
          missing=()
          for name in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID FOUNDRY_PROJECT_ENDPOINT MODEL_DEPLOYMENT_NAME; do
            if [ -z "${!name}" ]; then missing+=("$name"); fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::notice title=Foundry smoke blocked::Missing secrets/env: ${missing[*]}"
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: azure/login@v2
        if: steps.config.outputs.configured == 'true'
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - uses: actions/setup-python@v5
        if: steps.config.outputs.configured == 'true'
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        if: steps.config.outputs.configured == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Verify Foundry agent registration and response
        if: steps.config.outputs.configured == 'true'
        run: python scripts/verify_foundry_agent.py

  fabric-live-eval:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.config.outputs.configured }}
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      FABRIC_MCP_URL: ${{ secrets.FABRIC_MCP_URL }}
      FABRIC_WORKSPACE_ID: ${{ secrets.FABRIC_WORKSPACE_ID }}
      FABRIC_DATA_AGENT_ID: ${{ secrets.FABRIC_DATA_AGENT_ID }}
      FABRIC_MCP_TOOL_NAME: ${{ secrets.FABRIC_MCP_TOOL_NAME }}
    steps:
      - uses: actions/checkout@v4
      - name: Check Fabric configuration
        id: config
        run: |
          missing=()
          for name in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID; do
            if [ -z "${!name}" ]; then missing+=("$name"); fi
          done
          if [ -z "$FABRIC_MCP_URL" ] && { [ -z "$FABRIC_WORKSPACE_ID" ] || [ -z "$FABRIC_DATA_AGENT_ID" ]; }; then
            missing+=("FABRIC_MCP_URL or FABRIC_WORKSPACE_ID + FABRIC_DATA_AGENT_ID")
          fi
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::notice title=Fabric live eval blocked::Missing secrets/env: ${missing[*]}"
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: azure/login@v2
        if: steps.config.outputs.configured == 'true'
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      - uses: actions/setup-python@v5
        if: steps.config.outputs.configured == 'true'
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        if: steps.config.outputs.configured == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run Fabric golden-QA live eval
        if: steps.config.outputs.configured == 'true'
        run: python tests/eval/run_eval.py --pass-rate 80

  databricks-genie:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.config.outputs.configured }}
    env:
      DATABRICKS_WORKSPACE_URL: ${{ secrets.DATABRICKS_WORKSPACE_URL }}
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_WORKSPACE_URL }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_GENIE_SPACE_ID: ${{ secrets.DATABRICKS_GENIE_SPACE_ID }}
      DATABRICKS_GENIE_WAREHOUSE_ID: ${{ secrets.DATABRICKS_GENIE_WAREHOUSE_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Check Databricks configuration
        id: config
        run: |
          missing=()
          for name in DATABRICKS_WORKSPACE_URL DATABRICKS_GENIE_SPACE_ID; do
            if [ -z "${!name}" ]; then missing+=("$name"); fi
          done
          if [ -z "$DATABRICKS_TOKEN" ]; then
            echo "::notice title=Databricks auth::DATABRICKS_TOKEN is unset; the SDK will try other configured auth methods."
          fi
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::notice title=Databricks Genie smoke blocked::Missing secrets/env: ${missing[*]}"
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@v5
        if: steps.config.outputs.configured == 'true'
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        if: steps.config.outputs.configured == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Query Databricks Genie
        if: steps.config.outputs.configured == 'true'
        run: python -m src.orchestrator "Use Databricks Genie to show sales by territory for Tailspin Toys"

  published-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check published workshop site
        run: |
          curl --fail --location --silent --show-error https://ericchansen.github.io/agent-demo-dev/ > /dev/null
          python scripts/validate_links.py --timeout 20 website/docs README.md

  demo-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Offline eval and readiness
        run: |
          python tests/eval/run_eval.py --mock --pass-rate 100
          python scripts/demo_check.py

  summary:
    runs-on: ubuntu-latest
    needs:
      - foundry-registration
      - fabric-live-eval
      - databricks-genie
      - published-site
      - demo-readiness
    if: always()
    steps:
      - name: Aggregate live smoke results
        env:
          # Gated checks expose a `configured` output: 'true' means the live path ran,
          # anything else means required secrets were absent and the check was skipped.
          FOUNDRY_RESULT: ${{ needs.foundry-registration.result }}
          FOUNDRY_CONFIGURED: ${{ needs.foundry-registration.outputs.configured }}
          FABRIC_RESULT: ${{ needs.fabric-live-eval.result }}
          FABRIC_CONFIGURED: ${{ needs.fabric-live-eval.outputs.configured }}
          DATABRICKS_RESULT: ${{ needs.databricks-genie.result }}
          DATABRICKS_CONFIGURED: ${{ needs.databricks-genie.outputs.configured }}
          PUBLISHED_RESULT: ${{ needs.published-site.result }}
          READINESS_RESULT: ${{ needs.demo-readiness.result }}
        run: |
          set -euo pipefail

          declare -i failures=0
          declare -i skipped=0

          summary_file="${GITHUB_STEP_SUMMARY:-/dev/stdout}"
          {
            echo "# Live Smoke summary"
            echo ""
            echo "| Check | Status | Detail |"
            echo "| --- | --- | --- |"
          } >> "$summary_file"

          # gated_check NAME JOB_RESULT CONFIGURED_FLAG SKIP_HINT
          gated_check() {
            local name="$1" result="$2" configured="$3" hint="$4"
            local status detail
            if [ "$result" = "failure" ]; then
              status="❌ FAILED"
              detail="Live check ran and failed."
              failures+=1
            elif [ "$result" = "cancelled" ]; then
              status="⚠️ SKIPPED"
              detail="Job cancelled before completion."
              skipped+=1
            elif [ "$configured" = "true" ]; then
              status="✅ RAN"
              detail="Required secrets present; live path executed."
            else
              status="⚠️ SKIPPED"
              detail="$hint"
              skipped+=1
              echo "::warning title=$name skipped::$hint"
            fi
            echo "| $name | $status | $detail |" >> "$summary_file"
          }

          # always_check NAME JOB_RESULT
          always_check() {
            local name="$1" result="$2"
            local status detail
            if [ "$result" = "success" ]; then
              status="✅ RAN"
              detail="Executed on every run (no secrets required)."
            elif [ "$result" = "failure" ]; then
              status="❌ FAILED"
              detail="Unconditional check failed."
              failures+=1
            else
              status="⚠️ SKIPPED"
              detail="Job did not complete (result: $result)."
              skipped+=1
            fi
            echo "| $name | $status | $detail |" >> "$summary_file"
          }

          gated_check "Foundry agent registration" "$FOUNDRY_RESULT" "$FOUNDRY_CONFIGURED" \
            "Set AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID, FOUNDRY_PROJECT_ENDPOINT, MODEL_DEPLOYMENT_NAME to run."
          gated_check "Fabric golden-QA live eval" "$FABRIC_RESULT" "$FABRIC_CONFIGURED" \
            "Set Azure auth plus FABRIC_MCP_URL (or FABRIC_WORKSPACE_ID + FABRIC_DATA_AGENT_ID) to run."
          gated_check "Databricks Genie query" "$DATABRICKS_RESULT" "$DATABRICKS_CONFIGURED" \
            "Set DATABRICKS_WORKSPACE_URL and DATABRICKS_GENIE_SPACE_ID (plus auth) to run."
          always_check "Published workshop site" "$PUBLISHED_RESULT"
          always_check "Offline eval and demo readiness" "$READINESS_RESULT"

          {
            echo ""
            echo "**Totals:** ${failures} failed, ${skipped} skipped."
            if [ "$skipped" -gt 0 ]; then
              echo ""
              echo "> Skipped checks are **not** failures, but they mean no live coverage ran for that backend."
              echo "> A green Live Smoke run with skips does **not** prove the live integrations work."
            fi
          } >> "$summary_file"

          if [ "$failures" -gt 0 ]; then
            echo "::error title=Live Smoke::${failures} live check(s) failed."
            exit 1
          fi
