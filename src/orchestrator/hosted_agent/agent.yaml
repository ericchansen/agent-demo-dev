# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml
# Azure AI Foundry Hosted Agent deployment definition consumed by `azd deploy`.
#
# The `azd ai agent init -m ...` command accepts an AgentManifest wrapper, but
# once a service is in azure.yaml, the service directory contains this generated
# ContainerAgent definition. Keep this file aligned with the current Foundry
# sample output so `azd ai agent doctor` validates it.
#
# Reference:
#   https://learn.microsoft.com/en-us/azure/foundry/agents/concepts/hosted-agents
kind: hosted
name: WWISalesHostedAgent
description: >-
  Bring-your-own-code hosted agent for the Wide World Importers sales scenario.
  Wraps Fabric MCP, quota forecasting, web research, attainment, activity, and
  report-generation tools behind a single managed-container endpoint.
metadata:
  tags:
    - Wide World Importers
    - Hosted Agent
    - Responses Protocol
    - Invocations Protocol

protocols:
  - protocol: responses
    version: 1.0.0
  - protocol: invocations
    version: 1.0.0

resources:
  cpu: "1"
  memory: 2Gi

environment_variables:
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    value: gpt-4o
  - name: HOSTED_AGENT_ADAPTER
    value: local
