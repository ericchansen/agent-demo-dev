# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml
# Azure AI Foundry Hosted Agent deployment manifest.
#
# Current Hosted Agents use the ContainerAgent schema. The Responses protocol is
# the conversational surface that can be bridged by Foundry to Activity for
# Microsoft 365 Copilot and Teams. The Invocations protocol remains available
# for custom callers and non-conversational automation.
#
# Reference:
#   https://learn.microsoft.com/en-us/azure/foundry/agents/concepts/hosted-agents
kind: hosted
name: WWISalesHostedAgent
description: >-
  Bring-your-own-code hosted agent for the Wide World Importers sales scenario.
  Wraps Fabric MCP, quota forecasting, web research, attainment, activity, and
  report-generation tools behind a single managed-container endpoint.

resources:
  cpu: "1"
  memory: 2Gi

protocols:
  - protocol: responses
    version: 1.0.0
  - protocol: invocations
    version: 1.0.0

environment_variables:
  - name: MODEL_ENDPOINT
    value: ${FOUNDRY_PROJECT_ENDPOINT}
  - name: MODEL_DEPLOYMENT
    value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
  - name: HOSTED_AGENT_ADAPTER
    value: auto

health:
  liveness: /healthz
  readiness: /readyz
