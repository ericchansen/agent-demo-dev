[project]
name = "fabric-sales-agent-accelerator"
version = "0.1.0"
requires-python = ">= 3.11"
dependencies = [
    "azure-identity >= 1.17",
    "azure-ai-agents >= 1.1.0b3",
    "fabric-data-agent-client >= 0.1",
    "mcp >= 1.0",
    "python-docx >= 1.1",
    "python-pptx >= 1.0",
    "aiohttp >= 3.9",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
    "ruff",
    "mypy",
]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.ruff.format]

[tool.mypy]
warn_return_any = false
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "src.agents.*"
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "integration: MCP server integration tests (start subprocess, communicate via stdio)",
]
